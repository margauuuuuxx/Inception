secrets:
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  mysql_user_password:
    file: ../secrets/mysql_user_password.txt

services:
  mariadb:
    build: requirements/mariadb
    secrets:
      - mysql_root_password
      - mysql_user_password
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
  nginx:
    build:
    ports:
    volumes:
  wordpress:

voliumes:
