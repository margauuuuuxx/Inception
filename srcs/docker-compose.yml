secrets:
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  mysql_user_password:
    file: ../secrets/mysql_user_password.txt

services:
  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    secrets:
      - mysql_root_password
      - mysql_user_password
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    volumes:
      - /home/marlonco/mariadb_data:/var/lib/mysql
    networks:
      - inception

  wordpress: 
    build: 
      context: ./requirements
      dockerfile: wordpress/Dockerfile 
    container_name: wordpress
    depends_on:
      - mariadb # wordpress needs a database to function 
    volumes:
      - /home/marlonco/wordpress_data:/var/www/html
    networks:
      - inception

  nginx:
    build:
      context: ./requirements
      dockerfile: nginx/Dockerfile
    container_name: nginx
    depends_on:
      - wordpress # nginx proxies a request to wordpress: if no wordpress then no receiver for the request
    ports:
      - "443:443" # expose port 443 from the container to port 443 on the host (443 is for HTTPS)
    environment:
      - DOMAIN=${DOMAIN_NAME}
    networks:
      - inception

networks:
  inception:
    driver: bridge #creating a custom network using the bridge driver (= default docker network type)
